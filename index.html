<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Test</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    .card {
      position: relative;
      display: block;
      width: 260px;
      aspect-ratio: 2 / 3;
      overflow: hidden;
      border-radius: 18px;
      text-decoration: none;
      background: #222;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      isolation: isolate;
    }

    .base-image,
    .related-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      transition: transform 0.45s ease, opacity 0.45s ease, filter 0.45s ease;
      display: block;
    }

    .base-image {
      z-index: 1;
      transform: scale(1);
    }

    .related-image {
      z-index: 2;
      opacity: 0;
      transform: scale(1.03);
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.55) 0%,
        rgba(0, 0, 0, 0.18) 35%,
        rgba(0, 0, 0, 0.05) 60%,
        rgba(0, 0, 0, 0) 100%
      );
      pointer-events: none;
    }

    .label {
      position: absolute;
      left: 16px;
      bottom: 14px;
      z-index: 4;
      color: white;
      font-size: 16px;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
    }

    .card:hover .base-image {
      transform: scale(1.04);
      filter: brightness(0.82);
    }

    .card:hover .related-image {
      opacity: 1;
      transform: scale(1);
    }
  </style>
</head>
<body>
  <a class="card" href="https://www.notion.so/Bacterio-Tower-3393e1b63aa780fe97ecd6416392b4ed?source=copy_link" target="_blank" rel="noopener noreferrer">
    <img
      class="base-image"
      src="https://raw.githubusercontent.com/Wan7744/Merryweekend_charcters/1b01d0bcb9319ee90a332212bb8d772b837f2dd4/main/dummy.png"
      alt="기본 이미지"
    >
    <img
      class="related-image"
      src="https://raw.githubusercontent.com/Wan7744/Merryweekend_charcters/49d21d8cf0ee2e056d1aef60e62717a71af5128a/relate/dummy_relate.png"
      alt="관련 이미지"
    >
    <div class="overlay"></div>
    <div class="label">문서 1</div>
  </a>
</body>
</html>
