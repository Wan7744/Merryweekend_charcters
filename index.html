<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Personal Wiki Gallery</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: transparent;
      font-family: Pretendard, Arial, sans-serif;
    }

    .gallery {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      position: relative;
      display: block;
      width: 100%;
      aspect-ratio: 2 / 3;
      overflow: hidden;
      border-radius: 18px;
      text-decoration: none;
      background: #111;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      isolation: isolate;
    }

    .base-image,
    .related-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition:
        transform 0.45s ease,
        opacity 0.45s ease,
        filter 0.45s ease;
      display: block;
    }

    .base-image {
      z-index: 1;
      transform: scale(1);
    }

    .related-image {
      z-index: 2;
      opacity: 0;
      transform: scale(1.06);
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      background:
        linear-gradient(
          to top,
          rgba(0, 0, 0, 0.55) 0%,
          rgba(0, 0, 0, 0.18) 35%,
          rgba(0, 0, 0, 0.05) 60%,
          rgba(0, 0, 0, 0.0) 100%
        );
      pointer-events: none;
    }

    .label {
      position: absolute;
      left: 16px;
      bottom: 14px;
      z-index: 4;
      color: white;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
      opacity: 0.95;
      transition: transform 0.45s ease, opacity 0.45s ease;
    }

    .card:hover .base-image {
      transform: scale(1.06);
      filter: brightness(0.88);
    }

    .card:hover .related-image {
      opacity: 1;
      transform: scale(1);
    }

    .card:hover .label {
      transform: translateY(-2px);
      opacity: 1;
    }

    .card:focus-visible {
      outline: 3px solid rgba(120, 180, 255, 0.9);
      outline-offset: 4px;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .gallery {
        grid-template-columns: 1fr;
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="gallery">
    <a class="card" href="https://www.notion.so/Bacterio-Tower-3393e1b63aa780fe97ecd6416392b4ed?source=copy_link" target="_blank" rel="noopener noreferrer">
      <img class="base-image" src="main/무제1107_20260421123122.png" alt="이미지 1" />
