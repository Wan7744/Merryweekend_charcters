  <style>
    body {
      background: linear-gradient(
        to bottom,
        #ff5533,
        #0a0a0a
      );
    }
    
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      max-width: calc(150px * 7 + 10px * 6);
      margin: 0 auto;
    }

    .card {
      position: relative;
      display: block;
      width: 150px;
      height: 300px;
      overflow: hidden;
      border-radius: 18px;
      text-decoration: none;
      background: #222;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      isolation: isolate;
      transition: transform 0.25s ease;
    }

    .base-image,
    .related-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      transition: transform 0.35s ease, opacity 0.35s ease, filter 0.35s ease;
      display: block;
    }

    .base-image {
      z-index: 1;
      transform: scale(1);
    }

    .related-image {
      z-index: 2;
      opacity: 0;
      transform: scale(1.01);
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.55) 0%,
        rgba(0, 0, 0, 0.18) 35%,
        rgba(0, 0, 0, 0.05) 60%,
        rgba(0, 0, 0, 0) 100%
      );
      pointer-events: none;
    }

    .label {
      position: absolute;
      left: 16px;
      bottom: 14px;
      z-index: 4;
      color: white;
      font-size: 16px;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
    }

    .card:hover .base-image {
      transform: scale(1.02);
      filter: brightness(0.82);
    }

    .card:hover .related-image {
      opacity: 1;
      transform: scale(1);
      z-index: 10;
    }

    .gallery:hover .card {
      opacity: 0.8;
    }

    .gallery .card:hover {
      transform: scale(1.2);
      opacity: 1;
    }
  </style>
